<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Epic Refund</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #c8a96e;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    /* Контейнер на весь экран. Canvas внутри растягивается letterbox-ом. */
    #game-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #game-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #0a0a0a;
      display: block;
      box-shadow: 0 0 80px rgba(200, 169, 110, 0.06);
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-screen h1 {
      font-size: 2.5rem;
      letter-spacing: 0.3em;
      font-weight: normal;
      color: #c8a96e;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
    }

    #loading-tip {
      font-size: 0.85rem;
      color: #7a6a4a;
      font-style: italic;
      text-align: center;
      max-width: 90%;
      margin-bottom: 2.5rem;
      letter-spacing: 0.05em;
    }

    #progress-bar-wrap {
      width: 280px;
      height: 2px;
      background: #1a1a1a;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c8a96e 0%, #e8c98e 100%);
      transition: width 0.3s ease;
    }

    /* Подсказка по управлению, первая секунда */
    #controls-hint {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.08em;
      opacity: 0.6;
      pointer-events: none;
      font-family: 'Consolas', 'Monaco', monospace;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="960" height="540"></canvas>
  </div>

  <div id="loading-screen">
    <h1>Epic Refund</h1>
    <p id="loading-tip">«Что если RPG начинается с финального босса?»</p>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div id="controls-hint">WASD — движение · J — атака · K — тяжёлый удар · E — взаимодействие · Shift — перекат</div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
